name: Build and Test

on:
  push:
    branches: [ "main" ] # কোন ব্রাঞ্চে পুশ করলে এই বিল্ড রান হবে
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # কোন অপারেটিং সিস্টেমে রান হবে

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js # আপনার প্রজেক্ট অনুযায়ী (Node/Python/Java) রানটাইম সেট করুন
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run Build
      run: npm run build
