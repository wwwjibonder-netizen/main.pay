name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        # যদি প্রজেক্টে buildozer.spec ফাইল না থাকে, তবে এটি নতুন একটি তৈরি করবে
        if [ ! -f buildozer.spec ]; then buildozer init; fi
        # স্বয়ংক্রিয়ভাবে অ্যান্ড্রোয়েড APK বিল্ড করার কমান্ড (এটি কিছুটা সময় নিতে পারে)
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk-file
        path: bin/*.apk
