name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # একটি নির্দিষ্ট ও স্টেবল উবুন্টু ভার্সন

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # অ্যান্ড্রোয়েড বিল্ডের জন্য প্রয়োজনীয় জাভা এনভায়রনমেন্ট সেটআপ
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # অ্যান্ড্রোয়েড SDK এবং বিল্ডোজারের জন্য প্রয়োজনীয় লিনাক্স টুলস ইনস্টল করা
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1
        pip3 install --upgrade pip
        pip3 install buildozer cython virtualenv

    # যদি buildozer.spec ফাইল না থাকে তবে এটি স্বয়ংক্রিয়ভাবে তৈরি করবে
    - name: Handle Buildozer Spec File
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/title = My Application/title = StudentDB/g' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3,sqlite3,kivy/g' buildozer.spec
        fi

    # সরাসরি টার্মিনাল কমান্ডের মাধ্যমে APK বিল্ড করা (ডকার ছাড়া)
    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug

    # তৈরি হওয়া APK গিটহাবে আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Student-Database-Terminal-APK
        path: bin/*.apk
