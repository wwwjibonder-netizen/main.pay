name: Build Terminal APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK with Buildozer
      uses: digreatbrian/buildozer-action@v2
      with:
        python-version: '3.10'
        buildozer-cmd: |
          pip install --upgrade pip;
          if [ ! -f buildozer.spec ]; then buildozer init; fi;
          # এখানে প্রয়োজনীয় ফ্রেমওয়ার্ক প্যাকেজ সেট করা হচ্ছে
          sed -i 's/requirements = python3,kivy/requirements = python3,sqlite3,kivy/g' buildozer.spec;
          buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Student-Database-Terminal-APK
        path: ./**/*.apk
