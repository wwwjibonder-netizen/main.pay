jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend # 👈 আপনার যে ফোল্ডারে package.json আছে সেই ফোল্ডারের নাম দিন

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json' # 👈 এখানেও ফোল্ডারের পাথ দিন

    - name: Install dependencies
      run: npm ci

    - name: Run Build
      run: npm run build --if-present
