name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # স্বয়ংক্রিয়ভাবে এবং নির্ভুলভাবে APK তৈরি করার অফিশিয়াল অ্যাকশন টুল
    - name: Build APK with Buildozer
      uses: digreatbrian/buildozer-action@v2
      with:
        python-version: '3.10'
        buildozer-cmd: buildozer -v android debug

    # তৈরি হওয়া APK ফাইলটি ডাউনলোডের জন্য আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Android-App-APK
        path: ./**/*.apk # প্রজেক্টের যেকোনো ফোল্ডারে বিল্ড ফাইলটি থাকলে তা খুঁজে নেবে
